name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high || true

      - run: npm test

  publish:
    name: Publish to GitHub Packages
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com

      - run: npm ci --no-audit --no-fund
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Published @cappytech/hcs-schemas@$(node -p 'require(\"./package.json\").version')" >> $GITHUB_STEP_SUMMARY
